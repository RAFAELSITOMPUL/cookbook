name: cookbook_plus
description: CookBook+ - Kelola Resep Masakan Favorit
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.1.1
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  intl: any
  shared_preferences: ^2.2.2
  flutter_animate: ^4.5.0
  google_fonts: ^5.1.0
  image_picker: ^1.0.7
  cached_network_image: ^3.3.0
  uuid: ^4.3.3
  pdf: ^3.10.8
  printing: ^5.11.1
  share_plus: ^7.2.2
  flutter_svg: ^2.0.10+1
  sqflite_common_ffi: 2.2.5
  sqlite3_flutter_libs: ^0.5.20

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.svg"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.svg"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
