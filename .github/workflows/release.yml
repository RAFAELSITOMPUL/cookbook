name: Build and Release

on:
  push:
    tags:
      - "v*" # Memicu build otomatis saat Anda membuat tag (misal: v1.0.0)

permissions:
  contents: write # Izin penting agar bot bisa membuat Release dan upload APK

jobs:
  build:
    name: Build APK and AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Menggunakan versi stabil terbaru untuk menjamin keberhasilan build
          
      - name: Install Dependencies
        run: flutter pub get
        
      - name: Build APK Release
        run: flutter build apk --release
        
      - name: Build AppBundle Release
        run: flutter build appbundle --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true # Otomatis membuat catatan rilis berdasarkan commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
